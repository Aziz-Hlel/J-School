services:
  reverse-proxy:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ./docker/prod/Dockerfile.caddy
      args:
        VITE_NODE_ENV: ${NODE_ENV}
        VITE_API_URL: ${API_URL}

        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}

    # command: sleep infinity

    ports:
      - 4070:4070
      - 4071:4071

    networks:
      - default

  api:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/prod/Dockerfile.api

    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      ALLOWED_ORIGIN_PATTERNS: ${ALLOWED_ORIGIN_PATTERNS}
      FIREBASE_CERT: ${FIREBASE_CERT}

      IOS_MIN_SUPPORTED_VER: ${IOS_MIN_SUPPORTED_VER}
      ANDROID_MIN_SUPPORTED_VER: ${ANDROID_MIN_SUPPORTED_VER}

      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      BUCKET_PREFIX: ${BUCKET_PREFIX}
      AWS_CLOUDFRONT_URL: ${AWS_CLOUDFRONT_URL}

      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION}
      AWS_BEDROCK_ACCESS_KEY_ID: ${AWS_BEDROCK_ACCESS_KEY_ID}
      AWS_BEDROCK_SECRET_ACCESS_KEY: ${AWS_BEDROCK_SECRET_ACCESS_KEY}
      AWS_BEDROCK_MODEL_ID: ${AWS_BEDROCK_MODEL_ID}

    command: sh -c "pnpm dlx prisma migrate deploy && pnpm start"
    # command: sleep infinity

    depends_on:
      - db
      - redis

    networks:
      - default

  notification:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/stage/Dockerfile.notification

    environment:
      ONE_SIGNAL_APP_SECRET: ${ONE_SIGNAL_APP_SECRET}
      ONE_SIGNAL_APP_ID: ${ONE_SIGNAL_APP_ID}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}

    command: pnpm start

    depends_on:
      - redis

    networks:
      - default

  ocr:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/stage/Dockerfile.ocr

    environment:
      NODE_ENV: ${NODE_ENV}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}

      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION}
      AWS_BEDROCK_ACCESS_KEY_ID: ${AWS_BEDROCK_ACCESS_KEY_ID}
      AWS_BEDROCK_SECRET_ACCESS_KEY: ${AWS_BEDROCK_SECRET_ACCESS_KEY}
      AWS_BEDROCK_MODEL_ID: ${AWS_BEDROCK_MODEL_ID}

    command: pnpm start

    depends_on:
      - db
      - redis

    networks:
      - default

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_PORT: ${DB_PORT}
    volumes:
      - db_volume:/var/lib/postgresql/data

    networks:
      - default

  db-backup:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/prod/Dockerfile.backup

    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_CONTAINER_NAME: db

    volumes:
      - ${PROJECT_ROOT}/backup:/backup
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

    networks:
      - default

  redis:
    image: redis:latest
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_volume:/data
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']

    networks:
      - default

volumes:
  db_volume:
  redis_volume:
  minio_volume:

networks:
  default:
    name: jschool-network
